name: Build Trilink Custom Client

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Trilink Patch
        run: python patch_client.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Install VCPKG Dependencies
        run: |
          # Adicionamos o --classic para ele aceitar o pacote individual mesmo com o vcpkg.json presente
          vcpkg install sdk7-windows --triplet x64-windows-static-md --classic

      - name: Build Flutter Windows
        env:
          VCPKG_ROOT: C:\smoketest\vcpkg
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Windows
          path: flutter/build/windows/runner/Release/