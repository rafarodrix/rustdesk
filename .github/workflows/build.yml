name: Trilink Enterprise Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Trilink Patch
        run: python patch_client.py

      - name: Setup LLVM/Clang (O Motor do Bindgen)
        run: |
          # Aproveita o LLVM 20+ nativo do Github Actions
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          clang --version

      - name: Setup VCPKG e Codecs de Vídeo (Motor C++)
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Em 'manifest mode', o vcpkg lê o arquivo vcpkg.json na raiz do projeto e instala tudo sozinho
          & $env:USERPROFILE\vcpkg\vcpkg.exe install --triplet=x64-windows-static

      - name: Setup Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' 

      - name: Generate Rust-Flutter Bridge
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid
          $env:Path += ";$env:USERPROFILE\.cargo\bin"
          flutter_rust_bridge_codegen --rust-input ./libs/hbb_common/src/bridge_generated.rs --dart-output ./flutter/lib/generated_bridge.dart || flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart

      - name: Build Final (Flutter Windows)
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Upload Artifact Trilink
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Windows
          path: flutter/build/windows/runner/Release/