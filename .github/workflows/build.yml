name: Trilink Enterprise Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publicar release no GitHub"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Tag de release para workflow manual (ex: v2026.03.1)"
        required: false
        type: string

concurrency:
  group: trilink-enterprise-build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh

    env:
      ARTIFACT_NAME: Trilink-Suporte-Windows
      OUTPUT_DIR: flutter/build/windows/x64/runner/Release
      VCPKG_COMMIT_ID: 120deac3062162151622ca4860575a33844ba10b
      FLUTTER_VERSION: 3.24.5
      NSIS_SCRIPT: res/nsis/rustdesk-installer.nsi
      AGENT_DIR: remote-agent
      PORTAL_METADATA_ENDPOINT: /api/remote/rustdesk/build-metadata
      BUILD_VERSION: ""
      RELEASE_ZIP: ""
      SINGLE_EXE: ""
      NSIS_OUTPUT: ""
      DIAG_FILE: ""
      CHECKSUM_FILE: ""
      NSIS_BUILT: "false"

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'
        run: |
          if (-not "${{ github.event.inputs.release_tag }}") {
            throw "ERRO: release_tag e obrigatoria quando publish_release=true no workflow_dispatch."
          }

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Inject Custom Trilink Icon
        env:
          CUSTOM_ICON_URL: ${{ secrets.CUSTOM_ICON_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:CUSTOM_ICON_URL")) {
            Write-Host "CUSTOM_ICON_URL nao configurado. Mantendo icones padrao."
            exit 0
          }

          $tmpIcon = Join-Path $pwd "trilink.ico"
          $iconTargets = @(
            "res/icon.ico",
            "flutter/windows/runner/resources/app_icon.ico"
          )
          $iconReady = $false

          try {
            Write-Host "Baixando icone customizado..."
            Invoke-WebRequest -Uri "$env:CUSTOM_ICON_URL" -OutFile $tmpIcon -ErrorAction Stop

            if (-not (Test-Path $tmpIcon)) {
              throw "Falha ao baixar o arquivo de icone em $tmpIcon"
            }

            # Valida formato ICO (cabecalho 00 00 01 00) para evitar RC2175 no runner RC.
            $header = [System.IO.File]::ReadAllBytes($tmpIcon)[0..3]
            if ($null -eq $header -or $header.Length -lt 4) {
              throw "Arquivo de icone invalido: conteudo vazio/incompleto em $tmpIcon"
            }
            if ($header[0] -ne 0 -or $header[1] -ne 0 -or $header[2] -ne 1 -or $header[3] -ne 0) {
              $hex = ($header | ForEach-Object { $_.ToString("X2") }) -join " "
              throw "CUSTOM_ICON_URL nao retornou ICO valido (cabecalho: $hex). Use URL RAW direta para .ico."
            }

            # Bloqueia respostas HTML/texto salvas com extensao .ico (URL errada, auth, redirect, etc).
            $sample = [System.IO.File]::ReadAllBytes($tmpIcon)[0..31]
            $ascii = -join ($sample | ForEach-Object {
              if ($_ -ge 32 -and $_ -le 126) { [char]$_ } else { "." }
            })
            if ($ascii -match "<!DOCTYPE|<html|<?xml|AccessDenied|Not Found") {
              throw "CUSTOM_ICON_URL parece retornar HTML/texto e nao um .ico binario. Verifique o link RAW."
            }

            $iconReady = $true
          } catch {
            Write-Warning "Falha ao aplicar icone customizado: $($_.Exception.Message)"
            Write-Warning "Continuando com os icones padrao para nao bloquear o deploy."
          }

          if ($iconReady) {
            foreach ($target in $iconTargets) {
              if (Test-Path $target) {
                Copy-Item -Path $tmpIcon -Destination $target -Force
                Write-Host "Icone aplicado em $target"
              } else {
                Write-Warning "Caminho de icone nao encontrado: $target"
              }
            }
          } else {
            Write-Host "Fallback ativo: mantendo icones padrao do repositorio."
          }

          if (Test-Path $tmpIcon) {
            Remove-Item -Path $tmpIcon -Force
          }
      - name: Set Build Metadata
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } elseif ("${{ github.event.inputs.release_tag }}") {
            "${{ github.event.inputs.release_tag }}"
          } else {
            "manual-${{ github.run_number }}"
          }
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_ZIP=$env:ARTIFACT_NAME-$version.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SINGLE_EXE=SignOutput/Trilink-Suporte-$version-x64.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "NSIS_OUTPUT=dist/Trilink-Suporte-Installer-$version.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "DIAG_FILE=diagnostics-$version.json" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM_FILE=checksums-$version.txt" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Trilink Patch
        run: python patch_client.py

      - name: Setup LLVM/Clang
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          clang --version

      - name: Setup VCPKG and Video Codecs
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          git -C $env:USERPROFILE\vcpkg checkout $env:VCPKG_COMMIT_ID
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          $env:VCPKG_DEFAULT_HOST_TRIPLET = "x64-windows-static"
          & $env:USERPROFILE\vcpkg\vcpkg.exe install --triplet x64-windows-static --x-install-root="$env:USERPROFILE\vcpkg\installed" --x-manifest-root="$pwd"
          if (-Not (Test-Path "$env:USERPROFILE\vcpkg\installed\x64-windows-static\include\libavcodec\avcodec.h")) {
            Write-Host "ERRO: header FFmpeg nao encontrado no triplet x64-windows-static."
            if (Test-Path "$env:USERPROFILE\vcpkg\installed\x64-windows\include\libavcodec\avcodec.h") {
              Write-Host "Header encontrado em x64-windows (triplet divergente)."
            }
            throw "Dependencias FFmpeg incompletas para hwcodec."
          }

      - name: Setup Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter (Stable)
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Apply Flutter compatibility patch
        shell: bash
        run: |
          if [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]]; then
            cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$FLUTTER_ROOT/"
            cd "$FLUTTER_ROOT"
            if git apply --check flutter_3.24.4_dropdown_menu_enableFilter.diff; then
              git apply flutter_3.24.4_dropdown_menu_enableFilter.diff
            else
              echo "Flutter patch already applied or not applicable; skipping."
            fi
          fi

      - name: Generate Rust-Flutter Bridge
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid
          $env:Path += ";$env:USERPROFILE\.cargo\bin"
          cd flutter
          flutter config --no-analytics
          flutter pub get
          cd ..
          if (Test-Path "./libs/hbb_common/src/bridge_generated.rs") {
            flutter_rust_bridge_codegen --rust-input ./libs/hbb_common/src/bridge_generated.rs --dart-output ./flutter/lib/generated_bridge.dart
          } else {
            flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart
          }

      - name: Validate Remote Agent PowerShell Parse
        run: |
          $agentRoot = "remote-agent"
          if (-not (Test-Path $agentRoot)) {
            throw "Diretorio do agente nao encontrado: $agentRoot"
          }

          $scripts = Get-ChildItem -Path $agentRoot -Recurse -File -Filter *.ps1
          if (-not $scripts -or $scripts.Count -eq 0) {
            throw "Nenhum script .ps1 encontrado em $agentRoot"
          }

          $parseErrors = @()
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors -and $errors.Count -gt 0) {
              foreach ($err in $errors) {
                $parseErrors += "{0}: {1}" -f $script.FullName, $err.Message
              }
            }
          }

          if ($parseErrors.Count -gt 0) {
            Write-Host "Erros de parse detectados nos scripts do agente:"
            $parseErrors | ForEach-Object { Write-Host " - $_" }
            throw "Falha na validacao de parse dos scripts PowerShell do agente."
          }

          Write-Host "Parse OK: $($scripts.Count) script(s) .ps1 validados em $agentRoot."

      - name: Build Final (RustDesk Windows Upstream Mode)
        run: python .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack

      - name: Prepare folder for single-exe packing
        run: |
          if (Test-Path rustdesk) { Remove-Item -Recurse -Force rustdesk }
          New-Item -ItemType Directory -Force -Path rustdesk | Out-Null
          Copy-Item -Path "$env:OUTPUT_DIR\*" -Destination rustdesk -Recurse -Force

      - name: Build self-extracted executable
        shell: bash
        run: |
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe "${{ env.SINGLE_EXE }}"

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
          makensis /VERSION

      - name: Build NSIS Installer
        env:
          DISCOVERY_TOKEN: ${{ secrets.REMOTE_DISCOVERY_TOKEN }}
          PORTAL_BASE_URL: ${{ secrets.PORTAL_API_BASE_URL }}
          INSTALL_TOKEN: ${{ secrets.REMOTE_INSTALL_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          if (-not (Test-Path "$env:NSIS_SCRIPT")) {
            throw "Script NSIS nao encontrado: $env:NSIS_SCRIPT"
          }
          if (-not (Test-Path "$env:AGENT_DIR")) {
            throw "Diretorio do agente nao encontrado: $env:AGENT_DIR"
          }
          $requiredAgentFiles = @(
            "trilink-agente.ps1",
            "core\\paths.ps1",
            "core\\config.ps1",
            "core\\logging.ps1",
            "application\\sync.ps1",
            "application\\ack.ps1",
            "providers\\rustdesk.ps1",
            "providers\\syspro.ps1"
          )
          foreach ($rel in $requiredAgentFiles) {
            $full = Join-Path "$env:AGENT_DIR" $rel
            if (-not (Test-Path $full)) {
              throw "AGENT_DIR invalido: arquivo obrigatorio ausente: $full"
            }
          }
          if ([string]::IsNullOrWhiteSpace($env:DISCOVERY_TOKEN)) {
            throw "REMOTE_DISCOVERY_TOKEN nao configurado nos GitHub Secrets."
          }
          if ([string]::IsNullOrWhiteSpace($env:PORTAL_BASE_URL)) {
            throw "PORTAL_API_BASE_URL nao configurado nos GitHub Secrets."
          }
          if ([string]::IsNullOrWhiteSpace($env:INSTALL_TOKEN)) {
            throw "REMOTE_INSTALL_TOKEN nao configurado nos GitHub Secrets."
          }

          $appSourceDir = (Resolve-Path "$env:OUTPUT_DIR").Path -replace '/', '\\'
          $agentDirAbs = (Resolve-Path "$env:AGENT_DIR").Path -replace '/', '\\'
          $nsisOutputAbs = (Join-Path $pwd "$env:NSIS_OUTPUT") -replace '/', '\\'
          $portalBaseUrl = "$env:PORTAL_BASE_URL".TrimEnd('/')
          $appVersion = (Select-String -Path "Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches[0].Groups[1].Value
          $appBuildDate = (& "$appSourceDir\rustdesk.exe" --build-date | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($appBuildDate)) {
            $appBuildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm")
          }
          if ([string]::IsNullOrWhiteSpace($appVersion)) {
            throw "Nao foi possivel extrair version do Cargo.toml para o NSIS."
          }
          if ($appBuildDate -notmatch '^\d{4}-\d{2}-\d{2}( \d{2}:\d{2}(:\d{2})?)?$') {
            throw "Formato invalido de APP_BUILD_DATE: '$appBuildDate'. Esperado yyyy-MM-dd HH:mm (ou HH:mm:ss)."
          }
          $installToken = "$env:INSTALL_TOKEN"

          Write-Host "NSIS APP_SOURCE_DIR=$appSourceDir"
          Write-Host "NSIS AGENT_DIR=$agentDirAbs"
          Write-Host "NSIS OUTFILE=$nsisOutputAbs"
          Write-Host "NSIS APP_VERSION=$appVersion"
          Write-Host "NSIS APP_BUILD_DATE=$appBuildDate"

          makensis `
            /DAPP_NAME="Trilink Suporte Remoto" `
            /DAPP_EXE="rustdesk.exe" `
            /DAPP_SOURCE_DIR="$appSourceDir" `
            /DAGENT_DIR="$agentDirAbs" `
            /DDISCOVERY_TOKEN="$env:DISCOVERY_TOKEN" `
            /DPORTAL_BASE_URL="$portalBaseUrl" `
            /DINSTALL_TOKEN="$installToken" `
            /DAPP_VERSION="$appVersion" `
            /DAPP_BUILD_DATE="$appBuildDate" `
            /DOUTFILE="$nsisOutputAbs" `
            "$env:NSIS_SCRIPT"

          if (Test-Path "$env:NSIS_OUTPUT") {
            "NSIS_BUILT=true" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "NSIS installer gerado em $env:NSIS_OUTPUT"
          } else {
            "NSIS_BUILT=false" | Out-File -FilePath $env:GITHUB_ENV -Append
            throw "Falha: makensis executou, mas nao gerou o instalador esperado."
          }

      - name: Pack output
        run: |
          if (-Not (Test-Path "$env:OUTPUT_DIR")) {
            foreach ($log in @(
              "flutter/build/windows/x64/CMakeFiles/CMakeError.log",
              "flutter/build/windows/x64/CMakeFiles/CMakeOutput.log"
            )) {
              if (Test-Path $log) { Write-Host "===== $log ====="; Get-Content $log }
            }
            throw "Build final nao gerou pasta Release."
          }
          Compress-Archive -Path "$env:OUTPUT_DIR\*" -DestinationPath "$env:RELEASE_ZIP" -Force

      - name: Generate Diagnostics and Checksums
        if: always()
        run: |
          $hashes = @()
          $files = @("$env:RELEASE_ZIP", "$env:SINGLE_EXE")
          if ($env:NSIS_BUILT -eq "true") { $files += "$env:NSIS_OUTPUT" }
          foreach ($f in $files) {
            if (Test-Path $f) {
              $h = Get-FileHash -Algorithm SHA256 -Path $f
              $hashes += "$($h.Hash) *$f"
            }
          }
          $hashes | Out-File -FilePath "$env:CHECKSUM_FILE" -Encoding ascii

          $diag = [ordered]@{
            buildVersion = "$env:BUILD_VERSION"
            artifactZip = "$env:RELEASE_ZIP"
            singleExe = "$env:SINGLE_EXE"
            nsisOutput = "$env:NSIS_OUTPUT"
            nsisBuilt = "$env:NSIS_BUILT"
            flutterVersion = "$env:FLUTTER_VERSION"
            vcpkgCommit = "$env:VCPKG_COMMIT_ID"
            gitSha = "${{ github.sha }}"
            runId = "${{ github.run_id }}"
            runNumber = "${{ github.run_number }}"
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString("o")
          }
          $diag | ConvertTo-Json -Depth 5 | Out-File -FilePath "$env:DIAG_FILE" -Encoding utf8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Runtime-ZIP-${{ env.BUILD_VERSION }}
          path: ${{ env.RELEASE_ZIP }}
          if-no-files-found: error

      - name: Upload NSIS Installer
        if: env.NSIS_BUILT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Installer-${{ env.BUILD_VERSION }}
          path: ${{ env.NSIS_OUTPUT }}
          if-no-files-found: error

      - name: Upload Single EXE
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Single-EXE-${{ env.BUILD_VERSION }}
          path: ${{ env.SINGLE_EXE }}
          if-no-files-found: error

      - name: Upload Build Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Diagnostics-${{ env.BUILD_VERSION }}
          path: |
            ${{ env.DIAG_FILE }}
            ${{ env.CHECKSUM_FILE }}
          if-no-files-found: warn

      - name: Publish Build Metadata to Portal
        if: env.NSIS_BUILT == 'true'
        env:
          PORTAL_API_BASE_URL: ${{ secrets.PORTAL_API_BASE_URL }}
          PORTAL_API_TOKEN: ${{ secrets.PORTAL_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PORTAL_API_BASE_URL) -or [string]::IsNullOrWhiteSpace($env:PORTAL_API_TOKEN)) {
            Write-Host "PORTAL_API_BASE_URL ou PORTAL_API_TOKEN nao configurados. Pulando."
            exit 0
          }

          $baseUrl = "$env:PORTAL_API_BASE_URL".TrimEnd("/")
          $url = "$baseUrl$env:PORTAL_METADATA_ENDPOINT"
          $diag = Get-Content -Raw -Path "$env:DIAG_FILE" | ConvertFrom-Json

          $checksums = @()
          if (Test-Path "$env:CHECKSUM_FILE") {
            foreach ($line in (Get-Content "$env:CHECKSUM_FILE")) {
              if ($line -match '^([A-Fa-f0-9]+)\s+\*(.+)$') {
                $checksums += [ordered]@{ sha256 = $matches[1]; file = $matches[2] }
              }
            }
          }

          $payload = [ordered]@{
            buildVersion = $diag.buildVersion
            gitSha = $diag.gitSha
            runId = $diag.runId
            runNumber = $diag.runNumber
            artifacts = [ordered]@{
              zip = $diag.artifactZip
              singleExe = $diag.singleExe
              nsis = $diag.nsisOutput
              nsisBuilt = $diag.nsisBuilt
            }
            toolchain = [ordered]@{
              flutterVersion = $diag.flutterVersion
              vcpkgCommit = $diag.vcpkgCommit
            }
            checksums = $checksums
            generatedAtUtc = $diag.generatedAtUtc
          }

          try {
            Invoke-RestMethod -Method Post -Uri $url -ContentType "application/json" -Headers @{ Authorization = "Bearer $env:PORTAL_API_TOKEN" } -Body ($payload | ConvertTo-Json -Depth 10)
            Write-Host "Build metadata publicado em: $url"
          } catch {
            $statusCode = $null
            if ($_.Exception.Response -and $_.Exception.Response.StatusCode) {
              $statusCode = [int]$_.Exception.Response.StatusCode
            }
            Write-Warning "Falha ao publicar metadata no portal. Status=$statusCode URL=$url Erro=$($_.Exception.Message)"
            Write-Host "Continuando o pipeline sem bloquear release por falha de metadata."
            exit 0
          }

      - name: Deployment Summary
        if: always()
        run: |
          $nsisStatus = if ($env:NSIS_BUILT -eq "true") { "gerado" } else { "NAO gerado" }
          Add-Content $env:GITHUB_STEP_SUMMARY "## Trilink Enterprise Build"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "| Campo | Valor |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| ----- | ----- |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Build version | **$env:BUILD_VERSION** |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Git SHA | ``${{ github.sha }}`` |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Release ZIP | ``$env:RELEASE_ZIP`` |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Single EXE | ``$env:SINGLE_EXE`` |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| NSIS installer | ``$env:NSIS_OUTPUT`` ($nsisStatus) |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Checksums | ``$env:CHECKSUM_FILE`` |"

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.SINGLE_EXE }}
            ${{ env.CHECKSUM_FILE }}
            ${{ env.DIAG_FILE }}
            ${{ env.NSIS_BUILT == 'true' && env.NSIS_OUTPUT || '' }}

