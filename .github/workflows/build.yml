name: Build Trilink Custom Client

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Trilink Patch
        run: python patch_client.py

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5' # Mantemos a versão que o seu fork pede
          channel: 'stable'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Install Bridge Codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1
          # Adiciona o binário ao PATH para o Windows encontrar
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Flutter Windows
        run: |
          cd flutter
          flutter pub get
          # Tenta gerar a ponte antes do build (comando padrão do RustDesk)
          # Se este comando falhar no seu fork, me avise o nome do arquivo de tarefa
          flutter build windows --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trilink-Suporte-Windows
          path: flutter/build/windows/runner/Release/